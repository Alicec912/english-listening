<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>英听学院 MVP</title>
  <style>
    :root{--bg:#071120;--panel:#0f1d33;--card:#162d4d;--soft:#132845;--text:#f4f8ff;--muted:#9fb1cc;--accent:#50a7ff;--accent2:#83e4ff;--border:rgba(255,255,255,.12);--ok:#60e6a9;--shadow:0 24px 80px rgba(0,0,0,.35)}
    .light{--bg:#f5f7fb;--panel:#fff;--card:#fff;--soft:#eef4fb;--text:#08162d;--muted:#5d6e86;--accent:#1f7eea;--accent2:#04a7c9;--border:rgba(10,30,60,.14);--shadow:0 24px 70px rgba(30,70,120,.14)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 0 0,rgba(80,167,255,.18),transparent 30%),var(--bg);color:var(--text)}button,input,select,textarea{font:inherit}button{cursor:pointer}.shell{width:min(1420px,100%);margin:auto;padding:22px}.top{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px}.brand{display:flex;align-items:center;gap:12px}.logo{width:48px;height:48px;border-radius:17px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;color:#051426;font-size:22px;font-weight:900}.brand h1{font-size:22px;margin:0}.brand p{margin:2px 0 0;color:var(--muted);font-size:13px}.tabs{display:flex;gap:6px;padding:5px;border:1px solid var(--border);border-radius:999px}.tab,.btn,.tiny,.icon{border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text);border-radius:999px;padding:9px 14px}.tab.active,.primary,.filter.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#061426;border-color:transparent;font-weight:800}.actions{display:flex;gap:9px}.icon{width:42px;height:42px;padding:0}.grid{display:grid;grid-template-columns:minmax(0,1.25fr) minmax(360px,.75fr);gap:18px}.panel{background:rgba(15,29,51,.9);border:1px solid var(--border);border-radius:28px;box-shadow:var(--shadow);padding:18px}.light .panel{background:rgba(255,255,255,.92)}.right{position:sticky;top:14px;max-height:calc(100vh - 28px);display:flex;flex-direction:column}.videoBox{position:relative;aspect-ratio:16/9;border-radius:24px;overflow:hidden;background:#000;border:1px solid var(--border)}video,#yt{width:100%;height:100%;background:#000;display:block}.hidden{display:none!important}.placeholder{position:absolute;inset:0;display:grid;place-content:center;text-align:center;padding:28px;background:radial-gradient(circle,rgba(80,167,255,.22),rgba(4,10,18,.97))}.placeholder .play{margin:auto auto 15px;width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.12);display:grid;place-items:center;font-size:31px;color:var(--accent2)}h2,h3,p{margin:0}.placeholder h2{font-size:25px;margin-bottom:8px}.placeholder p{color:var(--muted);max-width:560px}.row{display:grid;grid-template-columns:1fr auto auto;gap:10px;margin-top:14px}.row input,.search input,textarea,select{width:100%;border:1px solid var(--border);border-radius:16px;background:rgba(255,255,255,.06);color:var(--text);padding:12px 14px;outline:none}.light .row input,.light .search input,.light textarea,.light select{background:#fff}.upload{display:grid;grid-template-columns:1fr 1fr auto;gap:12px;margin:14px 0}.box{border:1px dashed rgba(80,167,255,.45);background:rgba(80,167,255,.07);border-radius:18px;padding:14px;display:block}.box span{display:block;font-size:12px;color:var(--muted)}.box strong{display:block;margin-top:4px}.box input{display:none}.meta,.filters,.sentActions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.pill{font-size:13px;color:var(--muted);border:1px solid var(--border);border-radius:999px;background:rgba(255,255,255,.05);padding:8px 11px}.pill b{color:var(--text)}.tools{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:14px}.tool{border:1px solid var(--border);border-radius:20px;background:var(--soft);padding:14px;min-height:148px}.tool h3{font-size:16px;margin:8px 0 6px}.tool p{font-size:13px;color:var(--muted);line-height:1.45;margin-bottom:10px}.practice{margin-top:14px;background:var(--soft);border:1px solid var(--border);border-radius:22px;padding:16px}.practiceHead,.subHead{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}.current{border:1px solid var(--border);border-radius:18px;padding:16px;background:rgba(255,255,255,.05);min-height:82px}.current.empty{color:var(--muted)}.enbig{font-size:24px;font-weight:800;margin-bottom:8px}.zhbig{color:var(--muted)}body.dictation .zh,body.dictation .zhbig{filter:blur(6px);user-select:none}.subHead p{color:var(--muted);font-size:13px;margin-top:2px}.search{margin:7px 0 14px}.list{overflow:auto;display:grid;gap:10px;padding-right:4px}.card{border:1px solid var(--border);border-radius:20px;background:var(--card);padding:14px;transition:.15s}.card.active{border-color:var(--accent);box-shadow:0 0 0 3px rgba(80,167,255,.16)}.card.done{opacity:.72}.cardTop{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.time{font-size:12px;color:var(--accent2);background:rgba(80,167,255,.12);border-radius:999px;padding:4px 8px}.en{font-size:17px;font-weight:750;line-height:1.35}.zh{color:var(--muted);line-height:1.45;margin-top:6px}.note{display:none;min-height:70px;margin-top:10px;resize:vertical}.note.show{display:block}.tiny{font-size:12px;padding:7px 9px}.star.active{color:#ffd65b;border-color:rgba(255,214,91,.5)}.doneBtn.active{color:var(--ok);border-color:rgba(96,230,169,.5)}.empty{color:var(--muted);padding:18px;text-align:center;border:1px dashed var(--border);border-radius:18px}.rec{display:flex;justify-content:space-between;gap:10px;align-items:center;border:1px solid var(--border);border-radius:14px;background:rgba(255,255,255,.05);padding:9px 10px;margin-top:8px}.rec a{color:var(--accent2);text-decoration:none}.modal{position:fixed;inset:0;background:rgba(0,0,0,.48);display:grid;place-items:center;padding:20px;z-index:10}.modal.hidden{display:none}.modalCard{position:relative;width:min(760px,100%);max-height:82vh;overflow:auto;background:var(--panel);border:1px solid var(--border);box-shadow:var(--shadow);border-radius:28px;padding:26px}.close{position:absolute;right:16px;top:14px;width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:rgba(255,255,255,.08);color:var(--text)}.mini{display:grid;gap:10px;margin-top:14px}.miniItem{padding:12px;border:1px solid var(--border);border-radius:16px;background:rgba(255,255,255,.06)}.miniItem small{color:var(--muted)}.help ol{color:var(--muted);line-height:1.8}@media(max-width:980px){.top{align-items:flex-start;flex-direction:column}.grid{grid-template-columns:1fr}.right{position:static;max-height:none}.tools,.upload{grid-template-columns:1fr 1fr}}@media(max-width:640px){.shell{padding:12px}.tools,.upload,.row{grid-template-columns:1fr}.tabs{width:100%;overflow:auto}.brand h1{font-size:19px}}
  </style>
</head>
<body>
<div class="shell">
  <header class="top">
    <div class="brand"><div class="logo">听</div><div><h1>英听学院</h1><p>精听 · 跟读 · 单句循环</p></div></div>
    <nav class="tabs"><button class="tab active" data-panel="learn">学习</button><button class="tab" data-panel="saved">收藏</button><button class="tab" data-panel="notes">笔记</button><button class="tab" data-panel="help">帮助</button></nav>
    <div class="actions"><button id="theme" class="icon">☾</button><button id="export" class="btn">导出记录</button></div>
  </header>
  <main class="grid">
    <section class="panel">
      <div class="videoBox"><video id="video" controls preload="metadata"></video><div id="yt" class="hidden"></div><div id="ph" class="placeholder"><div class="play">▶</div><h2>上传视频或粘贴 YouTube 链接</h2><p>本地 MP4 可以直接上传。YouTube 会嵌入播放器，字幕仍需导入 JSON / SRT / VTT。</p></div></div>
      <div class="row"><input id="ytUrl" type="url" placeholder="粘贴 YouTube 链接，例如 https://www.youtube.com/watch?v=..."/><button id="loadYt" class="btn primary">读取 YouTube</button><button id="clearVideo" class="btn">清空</button></div>
      <div class="upload"><label class="box"><span>上传视频</span><strong>选择本地视频文件</strong><input id="videoFile" type="file" accept="video/*"></label><label class="box"><span>导入字幕</span><strong>JSON / SRT / VTT</strong><input id="subFile" type="file" accept=".json,.srt,.vtt,.txt"></label><button id="sample" class="btn primary">加载示例字幕</button></div>
      <div class="meta"><span class="pill">句子 <b id="count">0</b></span><span class="pill">已学 <b id="doneCount">0</b></span><span class="pill">收藏 <b id="favCount">0</b></span><span class="pill">模式 <b>本地保存</b></span></div>
      <section class="tools"><article class="tool"><div>🎧</div><h3>听写模式</h3><p>隐藏中文翻译。</p><label><input id="dictation" type="checkbox"> 开启</label></article><article class="tool"><div>🔁</div><h3>单句循环</h3><p>重复当前句子。</p><select id="loop"><option value="1">不循环</option><option value="2">循环 2 遍</option><option value="3" selected>循环 3 遍</option><option value="5">循环 5 遍</option></select></article><article class="tool"><div>⚡</div><h3>播放速度</h3><p>慢速精听。</p><select id="speed"><option value="0.7">0.7x</option><option value="0.8" selected>0.8x</option><option value="0.9">0.9x</option><option value="1">1x</option><option value="1.25">1.25x</option></select></article><article class="tool"><div>🎙️</div><h3>跟读录音</h3><p>点句子里的麦克风。</p><button id="stopRec" class="btn" disabled>停止录音</button></article></section>
      <section class="practice"><div class="practiceHead"><h2>当前练习</h2><button id="markDone" class="btn">标记已学</button></div><div id="current" class="current empty">选择右侧一句字幕开始。</div><div id="recordings"></div></section>
    </section>
    <aside class="panel right"><div class="subHead"><div><h2>动态字幕</h2><p>点击句子播放对应片段</p></div><div class="filters"><button class="tiny filter active" data-filter="all">全部</button><button class="tiny filter" data-filter="todo">未学</button><button class="tiny filter" data-filter="fav">收藏</button></div></div><div class="search"><input id="search" type="search" placeholder="搜索英文 / 中文 / 笔记"></div><div id="list" class="list"></div></aside>
  </main>
</div>
<div id="modal" class="modal hidden"><div class="modalCard"><button id="close" class="close">×</button><h2 id="modalTitle"></h2><div id="modalBody" class="mini"></div></div></div>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
const sample=[{id:1,start:0,end:4,text:'Welcome to the English listening demo.',translation:'欢迎来到英语听力测试 Demo。'},{id:2,start:4,end:8.5,text:'Click any subtitle card to replay one sentence.',translation:'点击任意字幕卡片，可以重复播放一句话。'},{id:3,start:8.5,end:13,text:'You can hide Chinese and practise dictation.',translation:'你可以隐藏中文，练习听写。'},{id:4,start:13,end:17.5,text:'Try recording your voice after each line.',translation:'试着每一句后录下自己的声音。'},{id:5,start:17.5,end:22,text:'This short video is only for testing the app.',translation:'这个短视频只是用来测试网站功能。'}];
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];
const st={subs:sample,active:null,filter:'all',q:'',fav:new Set(JSON.parse(localStorage.el_fav||'[]')),done:new Set(JSON.parse(localStorage.el_done||'[]')),notes:JSON.parse(localStorage.el_notes||'{}'),loopLeft:0,loopId:null,type:'local',yt:null,timer:null,rec:null,chunks:[],recs:[]};
const video=$('#video');let ytApiReady=false;window.onYouTubeIframeAPIReady=()=>{ytApiReady=true};
function save(){localStorage.el_fav=JSON.stringify([...st.fav]);localStorage.el_done=JSON.stringify([...st.done]);localStorage.el_notes=JSON.stringify(st.notes);stats()}
function stats(){$('#count').textContent=st.subs.length;$('#doneCount').textContent=st.done.size;$('#favCount').textContent=st.fav.size}
function esc(v){return String(v??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function t2s(v){const p=String(v).replace(',', '.').split(':').map(Number);if(p.length===3)return p[0]*3600+p[1]*60+p[2];if(p.length===2)return p[0]*60+p[1];return Number(v)||0}
function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(Math.floor(s%60)).padStart(2,'0')}
function parseText(txt){const clean=txt.replace(/^WEBVTT\s*/i,'').trim();return clean.split(/\n\s*\n/).map((b,i)=>{const lines=b.split('\n').map(x=>x.trim()).filter(Boolean);const ti=lines.findIndex(x=>x.includes('-->'));if(ti<0)return null;const [a,c]=lines[ti].split('-->').map(x=>x.trim().split(/\s+/)[0]);const content=lines.slice(ti+1);return{id:i+1,start:t2s(a),end:t2s(c),text:content[0]||'',translation:content.slice(1).join(' ')}}).filter(x=>x&&x.text)}
function normJson(j){const arr=Array.isArray(j)?j:(j.subtitles||j.items||[]);return arr.map((x,i)=>({id:x.id??i+1,start:Number(x.start??x.startTime??0),end:Number(x.end??x.endTime??((x.start??0)+3)),text:x.text||x.en||x.english||'',translation:x.translation||x.zh||x.chinese||''})).filter(x=>x.text)}
function visible(){return st.subs.filter(x=>{const n=st.notes[x.id]||'';const q=!st.q||[x.text,x.translation,n].join(' ').toLowerCase().includes(st.q);const f=st.filter==='all'||(st.filter==='todo'&&!st.done.has(String(x.id)))||(st.filter==='fav'&&st.fav.has(String(x.id)));return q&&f})}
function render(){stats();renderList();renderCurrent()}
function renderList(){const list=$('#list');const arr=visible();if(!arr.length){list.innerHTML='<div class="empty">没有找到匹配的句子。</div>';return}list.innerHTML='';arr.forEach(x=>{const d=document.createElement('article');d.className='card'+(String(x.id)===String(st.active)?' active':'')+(st.done.has(String(x.id))?' done':'');d.innerHTML=`<div class="cardTop"><span class="time">${fmt(x.start)}</span><button class="tiny star ${st.fav.has(String(x.id))?'active':''}">${st.fav.has(String(x.id))?'★':'☆'}</button></div><p class="en">${esc(x.text)}</p><p class="zh">${esc(x.translation||'暂无翻译')}</p><textarea class="note ${st.notes[x.id]?'show':''}" placeholder="给这句写一点笔记...">${esc(st.notes[x.id]||'')}</textarea><div class="sentActions"><button class="tiny play">▶ 播放</button><button class="tiny repeat">🔁 循环</button><button class="tiny noteBtn">📝 笔记</button><button class="tiny mic">🎙️ 跟读</button><button class="tiny doneBtn ${st.done.has(String(x.id))?'active':''}">✓ 已学</button></div>`;d.onclick=e=>{if(e.target.closest('button')||e.target.closest('textarea'))return;playSentence(x.id,false)};d.querySelector('.play').onclick=()=>playSentence(x.id,false);d.querySelector('.repeat').onclick=()=>playSentence(x.id,true);d.querySelector('.star').onclick=()=>{const k=String(x.id);st.fav.has(k)?st.fav.delete(k):st.fav.add(k);save();render()};d.querySelector('.doneBtn').onclick=()=>{const k=String(x.id);st.done.has(k)?st.done.delete(k):st.done.add(k);save();render()};d.querySelector('.noteBtn').onclick=()=>d.querySelector('.note').classList.toggle('show');d.querySelector('.note').oninput=e=>{st.notes[x.id]=e.target.value;save()};d.querySelector('.mic').onclick=()=>startRec(x.id);list.appendChild(d)})}
function byId(id){return st.subs.find(x=>String(x.id)===String(id))}
function renderCurrent(){const x=byId(st.active);$('#current').className=x?'current':'current empty';$('#current').innerHTML=x?`<div class="enbig">${esc(x.text)}</div><div class="zhbig">${esc(x.translation||'')}</div>`:'选择右侧一句字幕开始。'}
function curTime(){return st.type==='youtube'&&st.yt?.getCurrentTime?st.yt.getCurrentTime():video.currentTime||0}
function seek(s){if(st.type==='youtube'&&st.yt?.seekTo)st.yt.seekTo(s,true);else video.currentTime=s}
function play(){if(st.type==='youtube'&&st.yt?.playVideo)st.yt.playVideo();else video.play().catch(()=>alert('浏览器阻止自动播放，请手动点一下视频播放按钮。'))}
function pause(){if(st.type==='youtube'&&st.yt?.pauseVideo)st.yt.pauseVideo();else video.pause()}
function rate(){const r=Number($('#speed').value);if(st.type==='youtube'&&st.yt?.setPlaybackRate){const a=st.yt.getAvailablePlaybackRates?.()||[.25,.5,.75,1,1.25,1.5,2];st.yt.setPlaybackRate(a.reduce((b,c)=>Math.abs(c-r)<Math.abs(b-r)?c:b,a[0]))}else video.playbackRate=r}
function playSentence(id,loop){const x=byId(id);if(!x)return;st.active=x.id;st.loopId=x.id;st.loopLeft=loop?Number($('#loop').value):1;seek(Math.max(0,x.start+.02));rate();play();render()}
function tick(){const x=byId(st.loopId||st.active);if(!x||!st.loopLeft)return;if(curTime()>=x.end){st.loopLeft--;if(st.loopLeft>0){seek(x.start+.02);play()}else pause()}}
function ytId(u){try{const p=new URL(u);const h=p.hostname.replace(/^www\./,'');if(h==='youtu.be')return p.pathname.split('/').filter(Boolean)[0];if(h.endsWith('youtube.com')){if(p.pathname==='/watch')return p.searchParams.get('v');const parts=p.pathname.split('/').filter(Boolean);if(['embed','shorts','live'].includes(parts[0]))return parts[1]}}catch(e){if(/^[\w-]{11}$/.test(u))return u}return null}
function destroyYt(){if(st.timer)clearInterval(st.timer);st.timer=null;if(st.yt?.destroy)st.yt.destroy();st.yt=null;$('#yt').innerHTML=''}
function loadYt(){const id=ytId($('#ytUrl').value.trim());if(!id){alert('没有识别到 YouTube 链接。试试 watch / youtu.be / shorts 链接。');return}destroyYt();st.type='youtube';video.pause();video.removeAttribute('src');video.load();video.classList.add('hidden');$('#ph').classList.add('hidden');$('#yt').classList.remove('hidden');const create=()=>{st.yt=new YT.Player('yt',{videoId:id,playerVars:{playsinline:1,rel:0,modestbranding:1},events:{onReady:()=>{rate();st.timer=setInterval(tick,150)},onStateChange:e=>{if(e.data===0)st.loopLeft=0}}})}; if(window.YT?.Player)create();else{let tries=0;const w=setInterval(()=>{tries++;if(window.YT?.Player){clearInterval(w);create()}else if(tries>80){clearInterval(w);alert('YouTube API 加载失败，可能是网络或浏览器拦截。')}} ,150)}}
async function startRec(id){if(!navigator.mediaDevices?.getUserMedia){alert('当前浏览器不支持录音。Vercel/localhost 通常可以，普通 file:// 可能不稳定。');return}if(st.rec?.state==='recording')stopRec();try{const stream=await navigator.mediaDevices.getUserMedia({audio:true});st.chunks=[];st.rec=new MediaRecorder(stream);st.rec.ondataavailable=e=>st.chunks.push(e.data);st.rec.onstop=()=>{stream.getTracks().forEach(t=>t.stop());const blob=new Blob(st.chunks,{type:'audio/webm'});const url=URL.createObjectURL(blob);st.recs.unshift({id,url,time:new Date().toLocaleString()});renderRecs()};st.rec.start();$('#stopRec').disabled=false;$('#stopRec').textContent='停止录音中...'}catch(e){alert('无法开启麦克风：'+e.message)}}
function stopRec(){if(st.rec?.state==='recording')st.rec.stop();$('#stopRec').disabled=true;$('#stopRec').textContent='停止录音'}
function renderRecs(){const box=$('#recordings');box.innerHTML='';st.recs.forEach((r,i)=>{const d=document.createElement('div');d.className='rec';d.innerHTML=`<span>录音 ${i+1} · ${esc(r.time)}</span><a href="${r.url}" download="recording-${i+1}.webm">下载</a>`;box.appendChild(d)})}
function modal(title,html){$('#modalTitle').textContent=title;$('#modalBody').innerHTML=html;$('#modal').classList.remove('hidden')}
function mini(x,extra=''){return `<div class="miniItem"><strong>${esc(x.text)}</strong><p>${esc(x.translation||'')}</p>${extra?`<small>笔记：${esc(extra)}</small>`:''}</div>`}
function bind(){video.addEventListener('timeupdate',tick);$('#videoFile').onchange=e=>{const f=e.target.files?.[0];if(!f)return;destroyYt();st.type='local';video.src=URL.createObjectURL(f);video.classList.remove('hidden');$('#yt').classList.add('hidden');$('#ph').classList.add('hidden');rate()};$('#subFile').onchange=async e=>{const f=e.target.files?.[0];if(!f)return;try{const txt=await f.text();st.subs=f.name.toLowerCase().endsWith('.json')?normJson(JSON.parse(txt)):parseText(txt);st.active=null;render()}catch(err){alert('字幕解析失败：'+err.message)}};$('#sample').onclick=()=>{st.subs=sample;st.active=null;render()};$('#loadYt').onclick=loadYt;$('#ytUrl').onkeydown=e=>{if(e.key==='Enter')loadYt()};$('#clearVideo').onclick=()=>{destroyYt();st.type='local';video.pause();video.removeAttribute('src');video.load();video.classList.remove('hidden');$('#yt').classList.add('hidden');$('#ph').classList.remove('hidden');$('#ytUrl').value=''};$('#dictation').onchange=e=>document.body.classList.toggle('dictation',e.target.checked);$('#speed').onchange=rate;$('#search').oninput=e=>{st.q=e.target.value.trim().toLowerCase();renderList()};$$('.filter').forEach(b=>b.onclick=()=>{$$('.filter').forEach(x=>x.classList.remove('active'));b.classList.add('active');st.filter=b.dataset.filter;renderList()});$('#markDone').onclick=()=>{if(!st.active)return;st.done.add(String(st.active));save();render()};$('#stopRec').onclick=stopRec;$('#theme').onclick=()=>{document.documentElement.classList.toggle('light');$('#theme').textContent=document.documentElement.classList.contains('light')?'☀':'☾'};$('#export').onclick=()=>{const data={exportedAt:new Date().toISOString(),subtitles:st.subs,favorites:[...st.fav],completed:[...st.done],notes:st.notes};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='english-listening-progress.json';a.click();URL.revokeObjectURL(a.href)};$$('.tab').forEach(b=>b.onclick=()=>{if(b.dataset.panel==='learn')return; if(b.dataset.panel==='saved')modal('收藏句子',st.subs.filter(x=>st.fav.has(String(x.id))).map(x=>mini(x)).join('')||'<div class="empty">还没有收藏。</div>'); if(b.dataset.panel==='notes')modal('我的笔记',st.subs.filter(x=>st.notes[x.id]?.trim()).map(x=>mini(x,st.notes[x.id])).join('')||'<div class="empty">还没有笔记。</div>'); if(b.dataset.panel==='help')modal('使用说明','<div class="help"><ol><li>上传本地视频，或粘贴 YouTube 链接。</li><li>导入 JSON / SRT / VTT 字幕。</li><li>点击字幕卡片播放单句，点循环可重复播放。</li><li>录音功能需要 HTTPS 或 localhost，部署到 Vercel 后可用。</li><li>这个版本是单文件 index.html，上传 GitHub 最不容易丢文件。</li></ol></div>')});$('#close').onclick=()=>$('#modal').classList.add('hidden');$('#modal').onclick=e=>{if(e.target.id==='modal')$('#modal').classList.add('hidden')}}
document.addEventListener('DOMContentLoaded',()=>{bind();rate();render()});
</script>
</body>
</html>
